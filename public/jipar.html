<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1e3c72" />
  <title>Джипар — Заказы</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">

    <!-- Экран входа -->
    <div id="loginView">
      <div class="brand">MATKASYM</div>
      <h1>Вход для Джипар</h1>
      <p class="sub">Введите пароль, чтобы увидеть заказы.</p>
      <div class="card">
        <div id="loginErr" class="msg err hidden"></div>
        <div class="field">
          <label>Пароль</label>
          <input type="password" id="passInput" placeholder="••••••" />
        </div>
        <button class="btn big" id="loginBtn">Войти</button>
      </div>
    </div>

    <!-- Экран заказов -->
    <div id="ordersView" class="hidden">
      <div class="topbar">
        <h1>Заказы</h1>
        <span class="badge" id="countBadge">0</span>
      </div>

      <div class="tabs">
        <div class="tab active" data-status="active">Активные</div>
        <div class="tab" data-status="done">Выполненные</div>
      </div>

      <div id="ordersList"></div>
    </div>
  </div>

  <div id="lightbox" class="lightbox hidden"><img id="lightboxImg" alt="" /></div>

  <script>
    let pass = sessionStorage.getItem("jipar_pass") || "";
    let currentStatus = "active";

    const loginView = document.getElementById("loginView");
    const ordersView = document.getElementById("ordersView");

    async function login(p) {
      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pass: p }),
      });
      return res.ok;
    }

    document.getElementById("loginBtn").addEventListener("click", doLogin);
    document.getElementById("passInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doLogin();
    });

    async function doLogin() {
      const p = document.getElementById("passInput").value;
      const err = document.getElementById("loginErr");
      if (await login(p)) {
        pass = p;
        sessionStorage.setItem("jipar_pass", p);
        showOrders();
      } else {
        err.textContent = "Неверный пароль";
        err.classList.remove("hidden");
      }
    }

    function showOrders() {
      loginView.classList.add("hidden");
      ordersView.classList.remove("hidden");
      loadOrders();
    }

    document.querySelectorAll(".tab").forEach((t) => {
      t.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((x) => x.classList.remove("active"));
        t.classList.add("active");
        currentStatus = t.dataset.status;
        loadOrders();
      });
    });

    function esc(s) {
      return (s || "").replace(/[&<>"]/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    function timeAgo(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleString("ru-RU", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" });
    }

    async function loadOrders() {
      const list = document.getElementById("ordersList");
      list.innerHTML = '<div class="empty">Загрузка...</div>';
      const res = await fetch("/api/orders?status=" + currentStatus, {
        headers: { "x-jipar-pass": pass },
      });
      if (!res.ok) {
        sessionStorage.removeItem("jipar_pass");
        location.reload();
        return;
      }
      const orders = await res.json();
      document.getElementById("countBadge").textContent = orders.length;

      if (!orders.length) {
        list.innerHTML = '<div class="empty"><div class="icon">📭</div>' +
          (currentStatus === "active" ? "Пока нет активных заказов" : "Нет выполненных заказов") + "</div>";
        return;
      }

      list.innerHTML = orders.map((o) => {
        const tagClass = o.type === "real" ? "real" : "test";
        const tagText = o.type === "real" ? "Настоящий" : "Тестовый";
        const thumb = o.photo
          ? `<img class="thumb" src="${o.photo}" onclick="openLightbox('${o.id}')" data-full="${o.photo}" alt="" />`
          : `<div class="no-thumb">📦</div>`;
        const metaParts = [];
        if (o.sizes) metaParts.push("Размеры: " + esc(o.sizes));
        if (o.color) metaParts.push("Цвет: " + esc(o.color));
        if (o.note) metaParts.push(esc(o.note));
        metaParts.push("🕒 " + timeAgo(o.created_at));

        const doneBtn = currentStatus === "active"
          ? `<button class="done-btn" onclick="complete(${o.id}, this)" title="Отметить выполненным">✓</button>`
          : "";

        return `<div class="order" id="order-${o.id}">
          ${thumb}
          <div class="info">
            <span class="tag ${tagClass}">${tagText}</span>
            <div class="oname">${esc(o.name)}</div>
            <div class="meta">${metaParts.join("<br>")}</div>
          </div>
          ${doneBtn}
        </div>`;
      }).join("");
    }

    async function complete(id, btn) {
      btn.classList.add("loading");
      btn.disabled = true;
      const res = await fetch("/api/orders/" + id + "/complete", {
        method: "POST",
        headers: { "x-jipar-pass": pass },
      });
      if (res.ok) {
        const el = document.getElementById("order-" + id);
        el.style.transition = "opacity 0.3s, transform 0.3s";
        el.style.opacity = "0";
        el.style.transform = "translateX(40px)";
        setTimeout(loadOrders, 300);
      } else {
        btn.classList.remove("loading");
        btn.disabled = false;
      }
    }

    function openLightbox(id) {
      const img = document.querySelector("#order-" + id + " .thumb");
      if (!img) return;
      document.getElementById("lightboxImg").src = img.dataset.full;
      document.getElementById("lightbox").classList.remove("hidden");
    }
    document.getElementById("lightbox").addEventListener("click", () => {
      document.getElementById("lightbox").classList.add("hidden");
    });

    // Автообновление списка каждые 15 сек
    setInterval(() => {
      if (!ordersView.classList.contains("hidden")) loadOrders();
    }, 15000);

    // Если пароль уже сохранён — сразу показываем заказы
    if (pass) {
      login(pass).then((ok) => { if (ok) showOrders(); });
    }
  </script>
</body>
</html>
